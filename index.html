<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="referrer" content="no-referrer"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Babu Joyas"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>Babu Joyas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C9A96E; --gold-light: #e0c48a; --gold-dim: #8a6f3e;
      --black: #0a0a0a; --dark: #111; --dark2: #1a1a1a; --dark3: #222;
      --text: #f0ece4; --text-dim: #9a9080; --border: rgba(201,169,110,0.18);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { background:var(--black); color:var(--text); font-family:'Montserrat',sans-serif; font-weight:300; min-height:100vh; overflow-x:hidden; }
    #splash { position:fixed; inset:0; z-index:999; background:var(--black); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; transition:opacity 0.6s; }
    #splash.hide { opacity:0; pointer-events:none; }
    #splash .logo { font-family:'Cormorant Garamond',serif; font-size:2.8rem; font-weight:300; letter-spacing:0.18em; color:var(--gold); }
    #splash .bar { width:60px; height:1px; background:var(--gold); }
    #splash .sub { font-size:0.6rem; letter-spacing:0.3em; color:var(--text-dim); text-transform:uppercase; }
    header { position:fixed; top:env(safe-area-inset-top); left:0; right:0; z-index:100; height:60px; background:rgba(10,10,10,0.96); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 20px; }
    .logo-h { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:300; letter-spacing:0.14em; color:var(--gold); }
    .hicons { display:flex; gap:18px; }
    .hicons button { background:none; border:none; cursor:pointer; color:var(--text-dim); transition:color 0.2s; }
    .hicons button:hover { color:var(--gold); }
    nav { position:fixed; bottom:0; left:0; right:0; z-index:100; height:60px; background:rgba(10,10,10,0.97); backdrop-filter:blur(12px); border-top:1px solid var(--border); display:flex; }
    nav button { flex:1; background:none; border:none; cursor:pointer; color:var(--text-dim); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:0.5rem; letter-spacing:0.1em; text-transform:uppercase; font-family:'Montserrat',sans-serif; transition:color 0.2s; }
    nav button.active { color:var(--gold); }
    .page { display:none; padding:70px 0 70px; min-height:100vh; }
    .page.active { display:block; }
    .hero { padding:32px 20px 28px; border-bottom:1px solid var(--border); }
    .hero-eye { font-size:0.6rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
    .hero-title { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,8vw,3rem); font-weight:300; line-height:1.1; color:var(--text); }
    .hero-title em { color:var(--gold); font-style:italic; }
    .hero-cta { margin-top:18px; display:inline-flex; align-items:center; gap:8px; background:var(--gold); color:var(--black); font-size:0.6rem; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; padding:10px 20px; border:none; cursor:pointer; font-family:'Montserrat',sans-serif; }
    .slabel { font-size:0.6rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold); padding:24px 20px 8px; }
    .stitle { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:300; padding:0 20px 16px; }
    .cats { display:flex; gap:8px; overflow-x:auto; padding:0 20px 8px; scrollbar-width:none; }
    .cats::-webkit-scrollbar { display:none; }
    .cat { flex-shrink:0; padding:7px 14px; border:1px solid var(--border); font-size:0.55rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-dim); background:none; cursor:pointer; font-family:'Montserrat',sans-serif; white-space:nowrap; transition:all 0.2s; }
    .cat.active,.cat:hover { border-color:var(--gold); color:var(--gold); }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); margin-top:8px; }
    .card { background:var(--dark); cursor:pointer; position:relative; overflow:hidden; }
    .card img { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:var(--dark2); transition:transform 0.4s; }
    .card:hover img { transform:scale(1.04); }
    .cinfo { padding:10px 12px 14px; }
    .cref { font-size:0.5rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-dim); margin-bottom:3px; }
    .cname { font-family:'Cormorant Garamond',serif; font-size:0.9rem; line-height:1.3; color:var(--text); margin-bottom:6px; }
    .crow { display:flex; align-items:center; justify-content:space-between; }
    .cprice { font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--gold); }
    .fav-btn { background:none; border:none; cursor:pointer; padding:4px; }
    .skel { background:linear-gradient(90deg,var(--dark2) 25%,var(--dark3) 50%,var(--dark2) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
    @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }
    .skel-img { aspect-ratio:1; }
    .skel-line { height:10px; margin:8px 12px 4px; border-radius:2px; }
    .skel-line.s { width:50%; }
    .skel-line.p { width:35%; height:13px; margin-top:8px; }
    #detail { position:fixed; inset:0; z-index:200; background:var(--black); overflow-y:auto; transform:translateX(100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    #detail.open { transform:translateX(0); }
    .dback { position:sticky; top:0; z-index:1; height:52px; background:rgba(10,10,10,0.95); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; }
    .dback button { background:none; border:none; cursor:pointer; color:var(--gold); font-family:'Montserrat',sans-serif; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
    #detail img { width:100%; aspect-ratio:1; object-fit:cover; background:var(--dark2); }
    .dbody { padding:20px 20px 100px; }
    .dmat { font-size:0.55rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
    .dname { font-family:'Cormorant Garamond',serif; font-size:1.7rem; font-weight:300; line-height:1.2; margin-bottom:6px; }
    .dprice { font-family:'Cormorant Garamond',serif; font-size:1.5rem; color:var(--gold); margin-bottom:18px; }
    .ddesc { font-size:0.75rem; line-height:1.8; color:var(--text-dim); margin-bottom:24px; }
    .btn1 { width:100%; padding:15px; background:var(--gold); color:var(--black); border:none; cursor:pointer; font-family:'Montserrat',sans-serif; font-size:0.65rem; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:10px; }
    .btn2 { width:100%; padding:13px; background:transparent; color:var(--gold); border:1px solid var(--gold); cursor:pointer; font-family:'Montserrat',sans-serif; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; }
    .sinput { display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); margin:0 20px 20px; padding-bottom:12px; }
    .sinput input { flex:1; background:none; border:none; outline:none; color:var(--text); font-family:'Cormorant Garamond',serif; font-size:1.2rem; }
    .sinput input::placeholder { color:var(--text-dim); }
    .empty { text-align:center; padding:60px 20px; }
    .empty svg { color:var(--gold-dim); margin-bottom:14px; }
    .empty p { font-family:'Cormorant Garamond',serif; font-size:1.1rem; color:var(--text-dim); margin-bottom:6px; }
    .empty small { font-size:0.65rem; color:var(--text-dim); }
    .cart-item { display:flex; gap:12px; padding:14px 0; border-bottom:1px solid var(--border); align-items:center; }
    .cart-item img { width:60px; height:60px; object-fit:cover; background:var(--dark2); flex-shrink:0; }
    #toast { position:fixed; bottom:calc(90px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%) translateY(16px); background:var(--gold); color:var(--black); font-size:0.6rem; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; padding:9px 18px; z-index:300; opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .cbadge { position:absolute; top:8px; left:8px; background:var(--gold); color:var(--black); font-size:0.45rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; padding:2px 6px; }
    .ccount { position:absolute; top:-3px; right:-7px; width:15px; height:15px; border-radius:50%; background:var(--gold); color:var(--black); font-size:0.45rem; font-weight:700; display:flex; align-items:center; justify-content:center; }
    .cicon { position:relative; display:inline-flex; }
    .prow { display:flex; align-items:center; gap:14px; padding:20px; border-bottom:1px solid var(--border); }
    .pavatar { width:52px; height:52px; border-radius:50%; border:1px solid var(--gold); display:flex; align-items:center; justify-content:center; color:var(--gold); }
    .mitem { display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--border); cursor:pointer; font-size:0.75rem; color:var(--text); transition:color 0.2s; }
    .mitem:hover { color:var(--gold); }
    .mitem svg { color:var(--gold-dim); }
    .mchev { margin-left:auto; color:var(--text-dim); }
  </style>
</head>
<body>

<div id="splash">
  <div class="logo">BABU JOYAS</div>
  <div class="bar"></div>
  <div class="sub">Córdoba · Joyería artesanal</div>
</div>

<header>
  <div class="logo-h">BABU</div>
  <div class="hicons">
    <button onclick="showPage('search')">
      <svg width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="cicon" onclick="showPage('cart')" aria-label="Carrito">
      <svg width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span id="cart-badge" class="ccount" style="display:none">0</span>
    </button>
  </div>
</header>

<div id="page-home" class="page active">
  <div class="hero">
    <div class="hero-eye">Nueva colección</div>
    <div class="hero-title">Joyería que<br/><em>cuenta historias</em></div>
    <button class="hero-cta" onclick="showPage('catalog')">Ver colección →</button>
  </div>
  <div class="slabel">Explorar por categoría</div>
  <div class="cats" id="home-cats"></div>
  <div class="slabel" style="margin-top:4px">Destacados</div>
  <div class="stitle">Piezas seleccionadas</div>
  <div class="grid" id="home-grid"></div>
  <div style="padding:36px 20px;text-align:center;border-top:1px solid var(--border);margin-top:32px">
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--gold);margin-bottom:8px">Hecho con alma en Córdoba</div>
    <div style="font-size:0.65rem;color:var(--text-dim);line-height:1.9">Plata 925 · Oro 18k · Acero Waterproof<br/>Envíos 24-48h · Devoluciones 14 días</div>
  </div>
</div>

<div id="page-catalog" class="page">
  <div class="slabel">Catálogo</div>
  <div class="stitle">Toda la colección</div>
  <div class="cats" id="catalog-cats"></div>
  <div class="grid" id="catalog-grid"></div>
</div>

<div id="page-search" class="page">
  <div style="padding:20px 20px 0">
    <div class="sinput">
      <svg width="18" height="18" fill="none" stroke="#C9A96E" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" type="search" placeholder="Buscar pendientes, anillos…" oninput="doSearch(this.value)"/>
    </div>
  </div>
